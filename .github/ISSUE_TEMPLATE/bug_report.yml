name: Bug report
description: 报告可复现的功能、兼容性或导出问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        请先移除内部 URL、账号、Token、Cookie、本地绝对路径和敏感文档内容。安全漏洞请按 SECURITY.md 私下报告。

  - type: dropdown
    id: tool
    attributes:
      label: 受影响的工具
      options:
        - MD HTML Workspace
        - MD Word Workspace
        - 两者都有
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: 浏览器与版本
      placeholder: 例如 Chrome 149
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: 例如 Windows 11
    validations:
      required: true

  - type: dropdown
    id: opening_mode
    attributes:
      label: 打开方式
      options:
        - 本地 HTTP(S)
        - file:// 直接打开
        - 嵌入其他页面
        - 其他
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供最小、稳定的复现流程。
      placeholder: |
        1. 打开...
        2. 加载已脱敏的 Markdown...
        3. 点击...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true

  - type: textarea
    id: sample
    attributes:
      label: 最小示例或截图
      description: 只提供脱敏内容；不要上传公司文档、配置 JSON 或包含 Token 的截图。

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已确认 Issue 中不含凭据、内部地址或敏感文档内容。
          required: true
        - label: 我已使用仓库中的最新版本复现。
          required: true
