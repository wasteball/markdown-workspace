name: Feature request
description: 建议新的工作流、格式支持或体验改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 描述当前工作流中的具体困难，而不只是功能名称。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明理想交互、输入、输出和异常状态。
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - MD HTML Workspace
        - MD Word Workspace
        - 两者共有能力
        - 文档或发布流程
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 建议不要求在公开代码中硬编码私有服务或凭据。
          required: true
        - label: 内容不含内部 URL、账号、Token 或敏感文档。
          required: true
